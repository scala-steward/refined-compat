name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check-formatting:
    runs-on: ubuntu-latest
    name: Check formatting
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: coursier/setup-action@v3.0.0
        with:
          apps: scalafmt
      - name: Check formatting
        run: scalafmt --check

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: "temurin:1.17.0.15"
          apps: sbt
      - name: Compile and test all variations
        # sbt 2.0: the bare `test` task is incremental/machine-cached (behaves like sbt 1.x's
        # `testQuick`), so a fresh CI run can vacuously pass with "No tests to run". `testFull`
        # forces a real run.
        run: sbt testFull
